<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" rx="12" fill="#0d1117"/>

  <!-- ══════════ PLANNING group ══════════ -->
  <rect x="16" y="12" width="868" height="68" rx="10" fill="#111820" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="30" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="1.5">PLANNING</text>

  <!-- User input -->
  <rect x="28" y="38" width="130" height="32" rx="16" fill="none" stroke="#8b949e" stroke-width="1.5"/>
  <text x="93" y="59" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">"build feature X"</text>

  <!-- Arrow -->
  <line x1="158" y1="54" x2="174" y2="54" stroke="#8b949e" stroke-width="1.5"/>
  <polygon points="171,49 179,54 171,59" fill="#8b949e"/>

  <!-- Brainstorm -->
  <rect x="180" y="38" width="150" height="32" rx="6" fill="#1c1c2e" stroke="#7c3aed" stroke-width="2"/>
  <text x="255" y="52" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">Brainstorm</text>
  <text x="255" y="64" text-anchor="middle" fill="#c4b5fd" font-size="8" opacity="0.7">superpowers:brainstorming</text>

  <!-- Arrow -->
  <line x1="330" y1="54" x2="346" y2="54" stroke="#8b949e" stroke-width="1.5"/>
  <polygon points="343,49 351,54 343,59" fill="#8b949e"/>

  <!-- Plan -->
  <rect x="352" y="38" width="150" height="32" rx="6" fill="#1c1c2e" stroke="#7c3aed" stroke-width="2"/>
  <text x="427" y="52" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">Plan</text>
  <text x="427" y="64" text-anchor="middle" fill="#c4b5fd" font-size="8" opacity="0.7">superpowers:writing-plans</text>

  <!-- Hook arrow -->
  <line x1="502" y1="54" x2="518" y2="54" stroke="#e8a838" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="515,49 523,54 515,59" fill="#e8a838"/>

  <!-- Hook badge -->
  <rect x="524" y="42" width="64" height="24" rx="12" fill="#e8a838"/>
  <text x="556" y="58" text-anchor="middle" fill="#fff" font-size="8" font-weight="600">Hook fires</text>

  <!-- Arrow -->
  <line x1="588" y1="54" x2="604" y2="54" stroke="#8b949e" stroke-width="1.5"/>
  <polygon points="601,49 609,54 601,59" fill="#8b949e"/>

  <!-- Handover -->
  <rect x="610" y="38" width="260" height="32" rx="6" fill="#0f1d33" stroke="#3b82f6" stroke-width="2"/>
  <text x="740" y="52" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">Handover</text>
  <text x="740" y="64" text-anchor="middle" fill="#93c5fd" font-size="8" opacity="0.7">plan-executor:superpowers-plan-handover</text>

  <!-- ══════════ Big arrow down ══════════ -->
  <line x1="450" y1="80" x2="450" y2="112" stroke="#8b949e" stroke-width="2"/>
  <polygon points="443,108 450,118 457,108" fill="#8b949e"/>

  <!-- ══════════ EXECUTION group ══════════ -->
  <rect x="16" y="120" width="868" height="204" rx="10" fill="#111820" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="140" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="1.5">EXECUTION</text>

  <!-- ── Superpowers group ── -->
  <rect x="28" y="150" width="310" height="160" rx="8" fill="#1c1c2e" stroke="#7c3aed" stroke-width="2"/>
  <text x="183" y="170" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600" letter-spacing="1">SUPERPOWERS</text>

  <!-- Inline box -->
  <rect x="40" y="180" width="138" height="116" rx="6" fill="#252540" stroke="#5b4a9e" stroke-width="1"/>
  <text x="109" y="204" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">INLINE</text>
  <text x="109" y="232" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">Local</text>
  <text x="109" y="250" text-anchor="middle" fill="#8b949e" font-size="10">in session</text>
  <text x="109" y="264" text-anchor="middle" fill="#8b949e" font-size="9" opacity="0.7">current session</text>

  <!-- Subagent box -->
  <rect x="188" y="180" width="138" height="116" rx="6" fill="#252540" stroke="#5b4a9e" stroke-width="1"/>
  <text x="257" y="204" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">SUBAGENT</text>
  <text x="257" y="232" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">Local</text>
  <text x="257" y="250" text-anchor="middle" fill="#8b949e" font-size="10">in session</text>
  <text x="257" y="264" text-anchor="middle" fill="#8b949e" font-size="9" opacity="0.7">agent per task</text>

  <!-- ── Plan-Executor group ── -->
  <rect x="352" y="150" width="520" height="160" rx="8" fill="#0f1d33" stroke="#3b82f6" stroke-width="2"/>
  <text x="612" y="170" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700" letter-spacing="1.5">PLAN-EXECUTOR</text>

  <!-- Interactive box -->
  <rect x="364" y="180" width="156" height="116" rx="6" fill="#112244" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="442" y="204" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">INTERACTIVE</text>
  <text x="442" y="232" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">Local</text>
  <text x="442" y="250" text-anchor="middle" fill="#8b949e" font-size="10">in session</text>
  <text x="442" y="262" text-anchor="middle" fill="#8b949e" font-size="9" opacity="0.7">agent per task</text>
  <text x="442" y="273" text-anchor="middle" fill="#8b949e" font-size="9" opacity="0.7">reviewer team + PR mgmt</text>

  <!-- Local autonomous box -->
  <rect x="530" y="180" width="156" height="116" rx="6" fill="#0a2e26" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="608" y="204" text-anchor="middle" fill="#5eead4" font-size="10" font-weight="600">AUTONOMOUS</text>
  <text x="608" y="232" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">Local</text>
  <text x="608" y="250" text-anchor="middle" fill="#8b949e" font-size="10">local daemon</text>
  <text x="608" y="262" text-anchor="middle" fill="#8b949e" font-size="9" opacity="0.7">agent per task</text>
  <text x="608" y="273" text-anchor="middle" fill="#8b949e" font-size="9" opacity="0.7">reviewer team + PR mgmt</text>

  <!-- Remote autonomous box -->
  <rect x="696" y="180" width="164" height="116" rx="6" fill="#062b1e" stroke="#10b981" stroke-width="1.5"/>
  <text x="778" y="204" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">AUTONOMOUS</text>
  <text x="778" y="232" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">Remote</text>
  <text x="778" y="250" text-anchor="middle" fill="#8b949e" font-size="10">GitHub Actions</text>
  <text x="778" y="262" text-anchor="middle" fill="#8b949e" font-size="9" opacity="0.7">agent per task</text>
  <text x="778" y="273" text-anchor="middle" fill="#8b949e" font-size="9" opacity="0.7">reviewer team + PR mgmt</text>
</svg>
