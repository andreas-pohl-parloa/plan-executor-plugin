<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 540" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="540" rx="12" fill="#0d1117"/>

  <!-- ── Pipeline stages (left column, centered at x=320) ── -->

  <!-- User input -->
  <rect x="200" y="24" width="240" height="44" rx="22" fill="none" stroke="#8b949e" stroke-width="1.5"/>
  <text x="320" y="51" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">"build feature X"</text>

  <!-- Arrow 1 -->
  <line x1="320" y1="68" x2="320" y2="90" stroke="#8b949e" stroke-width="1.5"/>
  <polygon points="315,87 320,95 325,87" fill="#8b949e"/>

  <!-- Brainstorm -->
  <rect x="170" y="96" width="300" height="52" rx="8" fill="#4a90d9" filter="url(#shadow)"/>
  <text x="320" y="118" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Brainstorm</text>
  <text x="320" y="137" text-anchor="middle" fill="#d0e4f7" font-size="12">superpowers:brainstorming</text>

  <!-- Arrow 2 -->
  <line x1="320" y1="148" x2="320" y2="170" stroke="#8b949e" stroke-width="1.5"/>
  <polygon points="315,167 320,175 325,167" fill="#8b949e"/>

  <!-- Plan -->
  <rect x="170" y="176" width="300" height="52" rx="8" fill="#4a90d9" filter="url(#shadow)"/>
  <text x="320" y="198" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Plan</text>
  <text x="320" y="217" text-anchor="middle" fill="#d0e4f7" font-size="12">superpowers:writing-plans</text>

  <!-- Arrow 3 + hook label -->
  <line x1="320" y1="228" x2="320" y2="264" stroke="#e8a838" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="218" y="237" width="204" height="22" rx="11" fill="#e8a838"/>
  <text x="320" y="252" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">PostToolUse hook fires</text>

  <!-- Arrow 4 -->
  <line x1="320" y1="264" x2="320" y2="280" stroke="#8b949e" stroke-width="1.5"/>
  <polygon points="315,277 320,285 325,277" fill="#8b949e"/>

  <!-- Handover -->
  <rect x="170" y="286" width="300" height="52" rx="8" fill="#4a90d9" filter="url(#shadow)"/>
  <text x="320" y="308" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Handover</text>
  <text x="320" y="327" text-anchor="middle" fill="#d0e4f7" font-size="12">plan-executor:superpowers-plan-handover</text>

  <!-- ── Fan-out ── -->
  <line x1="320" y1="338" x2="320" y2="370" stroke="#8b949e" stroke-width="1.5"/>

  <!-- Left branch (Superpowers) -->
  <line x1="320" y1="370" x2="120" y2="370" stroke="#8b949e" stroke-width="1.5"/>
  <line x1="120" y1="370" x2="120" y2="400" stroke="#8b949e" stroke-width="1.5"/>
  <polygon points="115,397 120,405 125,397" fill="#8b949e"/>

  <!-- Right branch (Plan-Executor) -->
  <line x1="320" y1="370" x2="420" y2="370" stroke="#8b949e" stroke-width="1.5"/>
  <line x1="420" y1="370" x2="420" y2="400" stroke="#8b949e" stroke-width="1.5"/>
  <polygon points="415,397 420,405 425,397" fill="#8b949e"/>

  <!-- ── Superpowers group ── -->
  <rect x="20" y="406" width="200" height="80" rx="8" fill="#1c1c2e" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="428" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600" letter-spacing="1">SUPERPOWERS</text>
  <text x="70" y="453" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">Inline</text>
  <text x="70" y="470" text-anchor="middle" fill="#8b949e" font-size="11">current session</text>
  <line x1="120" y1="440" x2="120" y2="478" stroke="#3b3b5c" stroke-width="1" opacity="0.3"/>
  <text x="170" y="453" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">Subagent</text>
  <text x="170" y="470" text-anchor="middle" fill="#8b949e" font-size="11">agent per task</text>

  <!-- ── Plan-Executor group (outer) ── -->
  <rect x="240" y="406" width="400" height="114" rx="10" fill="#0c1f2e" stroke="#10b981" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="440" y="428" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700" letter-spacing="1.5">PLAN-EXECUTOR</text>

  <!-- Interactive sub-box -->
  <rect x="256" y="440" width="160" height="68" rx="6" fill="#112233" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="336" y="462" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">INTERACTIVE</text>
  <text x="336" y="482" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">Waves + Review</text>
  <text x="336" y="498" text-anchor="middle" fill="#8b949e" font-size="11">4-agent code review</text>

  <!-- Non-interactive sub-box -->
  <rect x="432" y="440" width="194" height="68" rx="6" fill="#062b1e" stroke="#10b981" stroke-width="1.5"/>
  <text x="529" y="462" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">NON-INTERACTIVE</text>

  <!-- Local -->
  <text x="478" y="486" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">Local</text>
  <text x="478" y="500" text-anchor="middle" fill="#8b949e" font-size="11">daemon</text>

  <!-- Separator -->
  <line x1="513" y1="474" x2="513" y2="506" stroke="#134e30" stroke-width="1"/>

  <!-- Remote -->
  <text x="562" y="486" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">Remote</text>
  <text x="562" y="500" text-anchor="middle" fill="#8b949e" font-size="11">GitHub Actions</text>

  <!-- ── Legend (right side, vertical) ── -->
  <rect x="660" y="96" width="140" height="200" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="730" y="120" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="1">LEGEND</text>

  <rect x="680" y="138" width="12" height="12" rx="3" fill="#4a90d9"/>
  <text x="700" y="149" fill="#e6edf3" font-size="12">Pipeline stage</text>

  <rect x="680" y="168" width="12" height="12" rx="3" fill="#e8a838"/>
  <text x="700" y="179" fill="#e6edf3" font-size="12">Automatic hook</text>

  <rect x="680" y="198" width="12" height="12" rx="3" fill="none" stroke="#7c3aed" stroke-width="2"/>
  <text x="700" y="209" fill="#e6edf3" font-size="12">Superpowers</text>

  <rect x="680" y="228" width="12" height="12" rx="3" fill="none" stroke="#10b981" stroke-width="2"/>
  <text x="700" y="239" fill="#e6edf3" font-size="12">Plan-Executor</text>

  <rect x="680" y="258" width="12" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="700" y="269" fill="#e6edf3" font-size="12">Interactive</text>
</svg>
